services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: appointment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: appointment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis (Caching, Rate Limiting, Sessions)
  redis:
    image: redis:7-alpine
    container_name: appointment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appointment_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/appointment_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80","http://localhost"]'
      BACKEND_URL: "http://localhost:8000"
      FRONTEND_URL: "http://localhost:3000"
      APP_NAME: Appointment Scheduling Platform
      APP_VERSION: 1.0.0
      DEBUG: "false"
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: "AppointEase <no-reply@appointease.local>"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_MODEL: grok-3-mini
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_RAG_API_KEY: ${GEMINI_RAG_API_KEY:-}
      ENABLE_PGVECTOR: "false"
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    restart: unless-stopped

  # MCP Server (read-only AI tools for AppointEase data)
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appointment_mcp
    command: ["python", "-m", "app.mcp_server"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/appointment_db
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_TRANSPORT: streamable-http
      ENABLE_PGVECTOR: "false"
    ports:
      - "8001:8001"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appointment_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: appointment_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_uploads:

networks:
  app-network:
    driver: bridge
